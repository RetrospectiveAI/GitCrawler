name: Deploy GitCrawler

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Pull latest code
        working-directory: /Users/mugen/server/retrospectiveAI-server/services/backend/GitCrawler
        run: git pull origin ${{ github.ref_name }}

      - name: Restart all services
        working-directory: /Users/mugen/server/retrospectiveAI-server
        run: ./restart.sh --all

      - name: Health check
        run: |
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://localhost:8081/health 2>/dev/null || true)
            if [[ "$STATUS" =~ ^(200|301|302)$ ]]; then
              echo "GitCrawler OK (HTTP $STATUS)"
              exit 0
            fi
            echo "  tentativa $i/15..."
            sleep 5
          done
          echo "GitCrawler não respondeu"
          docker compose -f /Users/mugen/server/retrospectiveAI-server/docker-compose.yml ps gitcrawler
          exit 1

      - name: Show tunnel URL
        run: |
          TUNNEL_URL=$(cat /Users/mugen/server/retrospectiveAI-server/.tunnel-url 2>/dev/null || echo "túnel não ativo")
          echo ""
          echo "=================================="
          echo "  URL EXTERNA: $TUNNEL_URL"
          echo "=================================="
