name: Deploy GitCrawler

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Pull latest code
        working-directory: /Users/mugen/server/retrospectiveAI-server/services/backend/GitCrawler
        run: git pull origin ${{ github.ref_name }}

      - name: Rebuild and restart gitcrawler
        working-directory: /Users/mugen/server/retrospectiveAI-server
        run: docker compose up -d --build gitcrawler

      - name: Health check
        run: |
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://localhost:8081/health 2>/dev/null || true)
            if [[ "$STATUS" =~ ^[2-4][0-9][0-9]$ ]]; then
              echo "GitCrawler OK (HTTP $STATUS)"
              exit 0
            fi
            echo "  attempt $i/15..."
            sleep 5
          done
          cd /Users/mugen/server/retrospectiveAI-server && docker compose ps gitcrawler
          exit 1

      - name: Show tunnel URL
        run: cat /Users/mugen/server/retrospectiveAI-server/.tunnel-url 2>/dev/null || echo "tunnel not active"
